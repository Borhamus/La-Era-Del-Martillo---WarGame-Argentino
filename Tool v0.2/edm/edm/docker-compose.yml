# ============================================================
# docker-compose.yml — La Era del Martillo V2
# Accesible en localhost:3000 y [IP-LAN]:3000
# ============================================================

version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: edm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: era_del_martillo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-edm_password_2025}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # Opcional: exponer para acceso con DBeaver/pgAdmin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d era_del_martillo"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
    container_name: edm_web
    restart: unless-stopped
    # Escuchar en todas las interfaces → accesible desde la red local
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-edm_password_2025}@db:5432/era_del_martillo
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@eradelMartillo.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-LaMatherFakingJhonsonKey}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    # El entrypoint corre migraciones antes de levantar la app
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed && node server.js"

  # Opcional: pgAdmin para gestionar la BD desde el navegador
  # Comentar si no se necesita
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: edm_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - tools   # Solo se levanta con: docker-compose --profile tools up

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: edm_network
